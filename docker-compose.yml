services:

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"   # Spark Master web UI -> http://localhost:8080
      - "7077:7077"   # Spark Master port (this is what your notebook connects to)
    volumes:
      - ./data:/data   # shared folder: host ./data <-> container /data
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_WEBUI_PORT=8081
    depends_on:
      - spark-master
    ports:
      - "8081:8081"   # Worker 1 web UI -> http://localhost:8081
    volumes:
      - ./data:/data   # SAME mount as master — workers need to see the file too
    deploy:
      resources:
        limits:
          memory: 1.2g
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1g
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_WEBUI_PORT=8081
    depends_on:
      - spark-master
    ports:
      - "8082:8081"   # Worker 2 web UI -> http://localhost:8082
    volumes:
      - ./data:/data   # SAME mount as master — workers need to see the file too
    deploy:
      resources:
        limits:
          memory: 1.2g
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
